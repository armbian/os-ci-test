# Track caller: Build All Artifacts. Thin wrapper over complete-artifact-matrix.yml.
name: "Build All Artifacts"

on:
  # No dispatch inputs: "build all artifacts" always runs with the fixed defaults
  # below (skipImages=yes, checkOci=yes, nightlybuild=yes, framework branch=main,
  # no targets filter, no version override) — nothing to select or override.
  # complete-artifact-matrix.yml reads each as `github.event.inputs.X || <default>`,
  # so with no inputs it falls back to exactly those values.
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/complete-artifact-matrix.yml
    with:
      release_repository: "os"
      target_path: "cron/"
      team: "Board Maintainers"
      repository_ref: "all"
      prepare_config: "armbian-images"
      targets_filename: "targets-all-not-eos.yaml"
      skipimages_default: "yes"
      checkoci_default: "yes"
      nightlybuild_default: "yes"
    secrets: inherit
