# Track caller: Build All Artifacts. Thin wrapper over complete-artifact-matrix.yml.
name: "Build All Artifacts"

on:
  # Only the framework build branch is exposed. Everything else (skipImages=yes,
  # checkOci=yes, nightlybuild=yes, no targets filter, no version override) is fixed
  # via the *_default / empty fallbacks complete-artifact-matrix.yml reads, so a
  # plain run still uses exactly those values.
  workflow_dispatch:
    inputs:
      branch:
        description: 'Framework build branch'
        type: string
        default: 'main'

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/complete-artifact-matrix.yml
    with:
      release_repository: "os"
      target_path: "cron/"
      team: "Board Maintainers"
      repository_ref: "all"
      prepare_config: "armbian-images"
      targets_filename: "targets-all-not-eos.yaml"
      skipimages_default: "yes"
      checkoci_default: "yes"
      nightlybuild_default: "yes"
    secrets: inherit
