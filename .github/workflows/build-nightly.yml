# Track caller: nightly images. Thin wrapper over complete-artifact-matrix.yml.
name: "Build Nightly Images"

on:
  workflow_dispatch:
    # Only the two values that actually vary per nightly run are exposed. Everything
    # else (skipImages=no, checkOci=yes, nightlybuild=yes, extra params, targets
    # filter) is fixed via the *_default / empty fallbacks that complete-artifact-
    # matrix.yml reads — i.e. the same values a scheduled run gets.
    inputs:
      branch:
        description: 'Framework build branch'
        type: string
        default: 'main'
      versionOverride:
        description: 'Version override'
        type: string
        default: ''

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/complete-artifact-matrix.yml
    with:
      release_repository: "os"
      target_path: "nightly/"
      team: "Release manager"
      repository_ref: "nightly"
      prepare_config: "armbian-images"
      targets_filename: "targets-release-nightly.yaml"
      skipimages_default: "no"
      checkoci_default: "yes"
      nightlybuild_default: "yes"
    secrets: inherit
